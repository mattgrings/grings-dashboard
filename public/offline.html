<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grings Team — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0A;
      color: #fff;
      font-family: 'DM Sans', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .container {
      max-width: 360px;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      opacity: 0.6;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .green { color: #00E620; }
    p {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      background: #00E620;
      color: #000;
      border: none;
      padding: 12px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0, 230, 32, 0.3);
    }
    button:active { transform: scale(0.97); }
    .pulse {
      width: 12px;
      height: 12px;
      background: #00E620;
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: pulse 2s ease-in-out infinite;
      opacity: 0.5;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.5); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo.png" alt="Grings Team" class="logo" />
    <div class="pulse"></div>
    <h1>GRINGS <span class="green">TEAM</span></h1>
    <p>Parece que você está sem conexão com a internet. Conecte-se e tente novamente.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
